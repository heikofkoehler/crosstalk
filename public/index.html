<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <title>Crosstalk AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col h-screen">
  <header class="p-4 bg-gray-800 text-center font-bold border-b border-gray-700">Crosstalk Spanish</header>
  
  <div id="canvas-area" class="flex-1 bg-white m-4 rounded-lg shadow-inner relative">
    <canvas id="crosstalkCanvas" class="w-full h-full"></canvas>
  </div>

  <div id="chat-history" class="h-1/3 overflow-y-auto p-4 space-y-2"></div>

  <div class="p-4 bg-gray-800 flex gap-2">
    <button id="micBtn" class="bg-blue-600 p-4 rounded-full hover:bg-blue-500 transition">🎤 Hold to Speak English</button>
    <div id="status" class="text-sm text-gray-400 self-center">Ready...</div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
